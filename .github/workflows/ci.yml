name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wally packages
        run: wally install

      - name: Ensure package folders exist
        run: |
          mkdir -p Packages
          mkdir -p ServerPackages
          mkdir -p DevPackages

      - name: StyLua format check
        run: stylua --check src

      - name: Selene lint
        run: selene src

      - name: Build place file
        run: rojo build default.project.json --output game.rbxl

      - name: Upload place artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: game.rbxl
          retention-days: 14
